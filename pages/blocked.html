<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAFAM Seite blockiert</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <main class="blocked-shell">
    <p class="eyebrow">GAFAM Blocker aktiv</p>
    <h1>Diese Seite wurde blockiert</h1>
    <p id="blocked-copy" class="copy">Diese Seite gehoert zu einem GAFAM-Anbieter.</p>

    <div class="target">
      <span>Zielseite</span>
      <strong id="blocked-url">-</strong>
    </div>

    <div class="actions">
      <button id="go-back" type="button">Zurueck</button>
      <button id="open-settings" type="button" class="secondary">Einstellungen</button>
    </div>
  </main>

  <script src="blocked.js"></script>
</body>
</html>
